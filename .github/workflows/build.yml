name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install SDK 34
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle 8.5 wrapper
        run: |
          mkdir -p /tmp/gradle-gen
          cd /tmp/gradle-gen
          touch settings.gradle
          gradle wrapper --gradle-version 8.5
          cp gradlew gradlew.bat ${{ github.workspace }}/
          mkdir -p ${{ github.workspace }}/gradle/wrapper
          cp gradle/wrapper/gradle-wrapper.jar ${{ github.workspace }}/gradle/wrapper/
          cp gradle/wrapper/gradle-wrapper.properties ${{ github.workspace }}/gradle/wrapper/

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PDFConverter-Debug
          path: app/build/outputs/apk/debug/*.apk
